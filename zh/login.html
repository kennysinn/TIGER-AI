<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 | Tiger AI</title>
    <meta name="description" content="登录 Tiger AI 工作台。">
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body data-auth-page="login">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Tiger AI 首页">
        <img class="brand-logo" src="../assets/tiger-ai-logo-header.jpeg" alt="Tiger AI">
      </a>
      <nav class="main-nav" aria-label="主导航">
        <a href="index.html">首页</a>
        <a href="consultant.html">顾问</a>
        <a href="workspace.html">工作台</a>
        <a href="dashboard.html">仪表盘</a>
      </nav>
      <div class="header-actions">
        <a class="language-toggle" href="../login.html">EN</a>
        <a class="primary-button" href="consultant.html">免费开始</a>
      </div>
    </header>

    <main class="page-shell">
      <section class="page-hero">
        <div class="page-intro">
          <div>
            <p class="eyebrow">Workspace Login</p>
            <h1>登录 Tiger AI。</h1>
          </div>
          <p>Email 和密码已通过 Supabase 连接。Google 登录可以之后再优化。</p>
        </div>
      </section>

      <section class="login-layout">
        <article class="login-card">
          <p class="eyebrow">账号访问</p>
          <h2>进入你的工作台</h2>
          <form class="form-grid" data-auth-form>
            <label>
              Email
              <input type="email" placeholder="you@company.com" autocomplete="email" data-auth-email required>
            </label>
            <label>
              密码
              <input type="password" placeholder="至少 6 个字符" autocomplete="current-password" data-auth-password required>
            </label>
            <button class="primary-button" type="submit">登录</button>
            <button class="secondary-button" type="button" data-auth-signup>创建账号</button>
            <button class="ghost-button" type="button" data-auth-google>使用 Google 登录</button>
            <button class="text-link auth-text-button" type="button" data-auth-reset>忘记密码？</button>
            <p data-auth-status></p>
          </form>
        </article>

        <article class="step-panel">
          <p class="eyebrow">登录后</p>
          <h2>打开创办人控制台。</h2>
          <ul class="compact-list">
            <li>保存你的 AI 公司工作台。</li>
            <li>追踪已配置的 AI 员工。</li>
            <li>准备演示链接和商业工具包。</li>
          </ul>
        </article>
      </section>
    </main>

    <footer class="footer">
      <strong>Tiger AI</strong>
      <span>安全进入你的 AI 公司工作台。</span>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../app.js"></script>
    <script src="../supabase-auth.js"></script>
  </body>
</html>
