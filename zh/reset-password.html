<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>重设密码 | Tiger AI</title>
    <meta name="description" content="设置新的 Tiger AI 登录密码。">
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body data-auth-page="reset-password">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Tiger AI 首页">
        <img class="brand-logo" src="../assets/tiger-ai-logo-header.jpeg" alt="Tiger AI">
      </a>
      <nav class="main-nav" aria-label="主导航">
        <a href="index.html">首页</a>
        <a href="consultant.html">顾问</a>
        <a href="workspace.html">工作台</a>
        <a href="dashboard.html">仪表盘</a>
      </nav>
      <div class="header-actions">
        <a class="language-toggle" href="../reset-password.html">EN</a>
        <a class="ghost-button" href="login.html">登录</a>
        <a class="primary-button" href="consultant.html">免费开始</a>
      </div>
    </header>

    <main class="page-shell">
      <section class="login-layout">
        <article class="login-card">
          <p class="eyebrow">密码重设</p>
          <h1>设置新的密码。</h1>
          <p>请使用邮箱里最新的重设链接，然后为你的 Tiger AI 工作台设置新密码。</p>

          <form class="form-grid" data-reset-form>
            <label>
              新密码
              <input type="password" minlength="8" autocomplete="new-password" data-reset-password required>
            </label>
            <label>
              确认密码
              <input type="password" minlength="8" autocomplete="new-password" data-reset-confirm required>
            </label>
            <button class="primary-button" type="submit">更新密码</button>
          </form>
          <p class="inline-status" data-auth-status></p>
          <a class="text-link" href="login.html">回到登录</a>
        </article>

        <aside class="next-box">
          <p class="eyebrow">账号访问</p>
          <h2>重设后</h2>
          <ul class="compact-list">
            <li>用新密码登录。</li>
            <li>打开你的仪表盘。</li>
            <li>继续建立你的 AI 公司。</li>
          </ul>
        </aside>
      </section>
    </main>

    <footer class="footer">
      <strong>Tiger AI</strong>
      <span>安全进入你的 AI 公司工作台。</span>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../app.js"></script>
    <script src="../supabase-auth.js"></script>
  </body>
</html>
